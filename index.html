<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIRE | Consultoría de Cambio Organizacional</title>
    
    <style>
        :root {
            --sky-base: #3b5c6f;
            --sky-4: #37586b; 
            --sky-3: #2b4a57;
            --sky-2: #1c323f;
            --sky-top: #030710;
            --ocean-bottom: #02050E;
            
            --text-main: #f9fafb;
            --text-muted: #8b949e;
            --accent: #58a6ff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
            background-color: #030710;
        }

        .background-gradient {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
        }

        .interactive-element {
            pointer-events: auto;
        }

        #brandHeader {
            position: absolute;
            padding: 3rem;
            line-height: 1;
            z-index: 15;
        }

        h1 {
            font-size: 3rem;
            font-weight: 700;
            letter-spacing: -0.03em;
            color: var(--text-main);
        }

        #blockSurface, #blockDepth {
            position: absolute;
            width: 100%;
            max-width: 440px;
            display: flex;
            flex-direction: column;
            pointer-events: auto;
            transform: translate(-50%, -50%); 
        }

        .surface-text, .depth-text {
            font-size: 1.25rem;
            font-weight: 400;
            color: var(--text-main);
        }

        .deep-text-block {
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }

        .description {
            font-size: 0.9rem;
            color: var(--text-muted);
            line-height: 1.5;
            font-weight: 400;
            max-width: 380px; 
        }

        .footer-contact {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
            margin-top: 3.5rem; 
        }

        .contact-label {
            font-size: 0.65rem;
            font-weight: 600;
            letter-spacing: 0.1em;
            color: var(--text-muted);
        }

        .contact-mail {
            font-size: 0.9rem;
            color: var(--text-main);
            text-decoration: none;
            font-weight: 400;
            background: none;
            border: none;
            padding: 0;
            cursor: pointer;
            font-family: inherit;
            text-align: left;
            transition: color 0.2s ease;
        }

        .contact-mail:hover {
            color: var(--accent);
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        @media (max-width: 768px) {
            body { 
                overflow-y: auto !important; 
                overflow-x: hidden;
            } 

            .background-gradient {
                position: fixed;
                height: 100vh;
                width: 100vw;
            }

            .ui-layer { 
                position: relative; 
                display: flex;
                flex-direction: column;
                height: auto;
                min-height: 100vh;
                padding: 1.5rem;
                pointer-events: auto;
            }

            #brandHeader {
                position: relative;
                padding: 1rem 0;
                top: auto;
                left: auto;
                width: 100%;
            }

            #blockSurface {
                position: relative;
                top: auto !important;
                left: auto !important;
                transform: none !important;
                max-width: 100%;
                margin-top: 1.5rem;
                margin-bottom: 2rem;
            }

            canvas {
                position: relative;
                display: block;
                height: 280px !important; 
                width: 100% !important;
                margin-bottom: 2rem;
                z-index: 5;
            }

            #blockDepth {
                position: relative;
                top: auto !important;
                left: auto !important;
                transform: none !important;
                max-width: 100%;
                margin-bottom: 3rem;
            }

            .description {
                max-width: 100%;
            }

            .footer-contact {
                margin-top: 3rem;
            }
        }
    </style>
</head>
<body>

    <div class="background-gradient" id="bgGradient"></div>

    <div id="tooltip" style="position: absolute; background: #161b22; border: 1px solid #30363d; padding: 0.75rem 1rem; border-radius: 6px; pointer-events: none; opacity: 0; z-index: 100; max-width: 260px; box-shadow: 0 8px 24px rgba(0,0,0,0.5); font-size: 0.75rem; color: #8b949e;">
        <h4 id="tooltip-title" style="font-size: 0.9rem; font-weight: 600; color: #58a6ff; margin-bottom: 0.25rem;">Concepto</h4>
        <p id="tooltip-desc">Descripción.</p>
    </div>

    <div class="ui-layer">
        <header id="brandHeader" class="interactive-element">
            <h1>PIRE</h1>
        </header>

        <div id="blockSurface">
            <p class="surface-text">Los síntomas asoman en la superficie.</p>
        </div>

        <canvas id="icebergCanvas"></canvas>

        <div id="blockDepth">
            <div class="deep-text-block">
                <p class="depth-text">Las causas se encuentran en la profundidad.</p>
                <p class="description">
                    Trabajamos con las personas para impactar sistemas complejos. Hacemos explícita la estructura y sus emergentes para impulsar transformaciones reales y orgánicas.
                </p>
            </div>
            
            <div class="footer-contact">
                <span class="contact-label" id="contactLabel">CONTACTO</span>
                <button onclick="copyEmailToClipboard()" class="contact-mail" id="contactMail" title="Click para copiar email">contacto@pire.ar</button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
    <script>
        const canvas = document.getElementById('icebergCanvas');
        const ctx = canvas.getContext('2d');
        const tooltip = document.getElementById('tooltip');
        const bgGradientDiv = document.getElementById('bgGradient');

        const elSurface = document.getElementById('blockSurface');
        const elDepth = document.getElementById('blockDepth');

        let width, height, waterLineY, dpr;
        let simulation;
        let grabbedNode = null;
        let hoveredNode = null;
        let stars = [];

        let icebergCenterCurrent = { x: 0, y: 0 };

        const descriptions = {
            "Sistema": "La red completa de relaciones donde el todo transforma la suma de las partes.",
            "Proceso": "Flujos visibles de trabajo que coordinan las tareas operativas diarias.",
            "Información": "Los flujos de datos que viajan o se estancan estructuralmente.",
            "Roles": "Expectativas oficiales y responsabilidades asignadas formalmente.",
            "Estructura": "El organigrama visible, jerarquías y arquitectura del negocio.",
            "Cultura": "Las reglas invisibles y valores reales que dictan el comportamiento diario.",
            "Poder": "Dinámicas de influencia informal y toma de decisiones fuera de los canales.",
            "Incentivos": "Los motores reales que impulsan u orientan las prioridades de los equipos.",
            "Comunicación": "Intercambios ocultos, ruidos internos, interpretaciones y supuestos.",
            "Confianza": "El lubricante relacional que reduce la ficción y acelera la delegación.",
            "Propósito": "La brújula profunda que unifica y dota de sentido a la operation.",
            "Decisiones": "Los criterios reales que definen el rumbo, más allá de la burocracia.",
            "Adaptación": "Capacidad resiliente para responder al entorno cambiando sin romperse.",
            "Aprendizaje": "Mecanismos por los cuales la empresa capitaliza fallas y evoluciona."
        };

        const nodes = [
            { id: "Sistema", type: "visible" }, { id: "Proceso", type: "visible" }, { id: "Información", type: "visible" },     
            { id: "Roles", type: "visible" }, { id: "Estructura", type: "visible" }, { id: "Cultura", type: "invisible" },       
            { id: "Poder", type: "invisible" }, { id: "Incentivos", type: "invisible" }, { id: "Comunicación", type: "invisible" },  
            { id: "Confianza", type: "invisible" }, { id: "Propósito", type: "invisible" }, { id: "Decisiones", type: "invisible" },    
            { id: "Adaptación", type: "invisible" }, { id: "Aprendizaje", type: "invisible" }    
        ];

        const macroNodes = [
            { id: "texto1", x: 0, y: 0, radius: 110 },
            { id: "iceberg", x: 0, y: 0, radius: 140 },
            { id: "texto2", x: 0, y: 0, radius: 150 }
        ];

        const triangles = [
            [0, 1, 5], [1, 2, 5], [2, 5, 8], [2, 6, 8], [2, 3, 6], [3, 6, 9],
            [3, 7, 9], [3, 4, 7], [4, 7, 11], [5, 8, 10], [6, 8, 12], [6, 9, 12],
            [7, 9, 11], [8, 10, 12], [9, 11, 13], [9, 12, 13], [10, 12, 13],
            [0, 5, 10], [4, 11, 13]
        ];

        const outerPerimeterIndices = [0, 1, 2, 3, 4, 11, 13, 10, 0];
        const colorsAbove = ["#CAE6EF", "#B2D3E5", "#82B1C6"];
        const colorsBelow = ["#137BA1", "#175878", "#124A63"];

        const links = [];
        const linkSet = new Set();
        triangles.forEach(t => {
            [[t[0], t[1]], [t[1], t[2]], [t[2], t[0]]].forEach(p => {
                const key = Math.min(p[0], p[1]) + "-" + Math.max(p[0], p[1]);
                if (!linkSet.has(key)) { linkSet.add(key); links.push({ source: p[0], target: p[1] }); }
            });
        });

        function resize() {
            const isMobile = window.innerWidth <= 768;
            
            width = canvas.clientWidth;
            height = canvas.clientHeight;
            
            waterLineY = isMobile ? height * 0.50 : height * 0.42;

            dpr = window.devicePixelRatio || 1;
            canvas.width = width * dpr;
            canvas.height = height * dpr;
            
            ctx.resetTransform();
            ctx.scale(dpr, dpr);

            const totalHeightGradient = isMobile ? window.innerHeight * 1.8 : window.innerHeight;
            const currentAbsWaterLine = isMobile ? canvas.getBoundingClientRect().top + waterLineY : waterLineY;
            const pctWater = (currentAbsWaterLine / totalHeightGradient) * 100;
            bgGradientDiv.style.background = `linear-gradient(to bottom, 
                #02050E 0%, 
                #030710 ${pctWater * 0.4}%, 
                #1c323f ${pctWater * 0.9}%, 
                #2b4a57 ${pctWater * 0.99}%, 
                #37586b ${pctWater}%, 
                #030710 ${pctWater}%, 
                #030710 100%)`;

            macroNodes[0].radius = 100;
            macroNodes[1].radius = 160;
            macroNodes[2].radius = 140;

            macroNodes[0].homeX = window.innerWidth * 0.28; macroNodes[0].homeY = waterLineY - 40;
            macroNodes[1].homeX = window.innerWidth * 0.68; macroNodes[1].homeY = waterLineY + 50;
            macroNodes[2].homeX = window.innerWidth * 0.28; macroNodes[2].homeY = waterLineY + 90;

            macroNodes.forEach(m => { 
                if(!m.x) { 
                    m.x = window.innerWidth + 200; 
                    m.y = waterLineY;  
                    m.vx = 0; m.vy = 0; 
                } 
            });

            nodes.forEach(n => {
                if (!n.x || isMobile) {
                    n.x = width + 200; 
                    n.y = waterLineY;  
                }
            });

            stars = [];
            const totalStars = isMobile ? 12 : 50;
            const skyLimitY = isMobile ? window.innerHeight * 0.35 : waterLineY * 0.5;

            for (let i = 0; i < totalStars; i++) {
                const starX = Math.random() * window.innerWidth;
                const starY = Math.random() * skyLimitY;
                const ratio = 1 - (starY / skyLimitY);
                const opacity = Math.pow(ratio, 2.0) * 0.35;
                stars.push({ x: starX, y: starY, opacity: opacity });
            }

            initSimulation();
        }

        function initSimulation() {
            if (simulation) simulation.stop();

            simulation = d3.forceSimulation(nodes)
                .force("link", d3.forceLink(links).id(d => d.index).distance(window.innerWidth <= 768 ? 50 : 110).strength(0.02))
                .force("charge", d3.forceManyBody().strength(-90))
                .force("collide", d3.forceCollide(window.innerWidth <= 768 ? 16 : 42))
                .alphaTarget(0.02)
                .on("tick", handleSystemPhysics);
        }

        function handleSystemPhysics() {
            const isMobile = window.innerWidth <= 768;

            if (!isMobile) {
                const K = 0.08;
                macroNodes.forEach(m => {
                    m.x += (m.homeX - m.x) * K;
                    m.y += (m.homeY - m.y) * K;
                });

                for (let i = 0; i < macroNodes.length; i++) {
                    for (let j = i + 1; j < macroNodes.length; j++) {
                        const n1 = macroNodes[i]; const n2 = macroNodes[j];
                        const dx = n2.x - n1.x; const dy = n2.y - n1.y;
                        const dist = Math.hypot(dx, dy); const minDist = n1.radius + n2.radius;
                        if (dist < minDist) {
                            const overlap = minDist - dist;
                            const nx = dx / (dist || 1); const ny = dy / (dist || 1);
                            n1.x -= nx * overlap * 0.5; n1.y -= ny * overlap * 0.5;
                            n2.x += nx * overlap * 0.5; n2.y += ny * overlap * 0.5;
                        }
                    }
                }

                elSurface.style.left = `${macroNodes[0].x}px`;
                elSurface.style.top = `${macroNodes[0].y}px`;
                elDepth.style.left = `${macroNodes[2].x}px`;
                elDepth.style.top = `${macroNodes[2].y}px`;

                icebergCenterCurrent.x = macroNodes[1].x;
                icebergCenterCurrent.y = macroNodes[1].y;
            } else {
                elSurface.style.left = ""; elSurface.style.top = "";
                elDepth.style.left = ""; elDepth.style.top = "";
                
                icebergCenterCurrent.x = width * 0.5;
                icebergCenterCurrent.y = waterLineY;
            }

            let totalX = 0, totalY = 0;
            nodes.forEach(n => { totalX += n.x; totalY += n.y; });
            const centerMassX = totalX / nodes.length;
            const centerMassY = totalY / nodes.length;

            const targetGlobalY = icebergCenterCurrent.y - (isMobile ? 15 : 0); 
            const targetGlobalX = icebergCenterCurrent.x;

            const diffY = targetGlobalY - centerMassY;
            const diffX = targetGlobalX - centerMassX;

            let torque = 0;
            nodes.forEach(n => {
                const rx = n.x - centerMassX;
                const buoyancyForce = (n.y > waterLineY) ? -0.008 : 0.005;
                torque += rx * buoyancyForce;
            });

            const angleVelocity = Math.max(-0.01, Math.min(0.01, torque * 0.00025));
            const nodeSpacing = isMobile ? 20 : 50;

            nodes.forEach((n, i) => {
                n.y += diffY * 0.015;
                n.x += diffX * 0.01;

                const rx = n.x - centerMassX; const ry = n.y - centerMassY;
                n.x += -ry * angleVelocity; n.y += rx * angleVelocity;

                let baseHomeX = (icebergCenterCurrent.x - (nodeSpacing * 2)) + (i * nodeSpacing);
                let baseHomeY = waterLineY - (isMobile ? 25 : 110) + (Math.sin(i) * 12);
                if (n.type === "invisible") {
                    if (i >= 5 && i <= 9) {
                        baseHomeX = (icebergCenterCurrent.x - (nodeSpacing * 2)) + ((i - 5) * nodeSpacing);
                        baseHomeY = waterLineY + (isMobile ? 20 : 90);
                    } else {
                        baseHomeX = (icebergCenterCurrent.x - (nodeSpacing * 1.5)) + ((i - 10) * (nodeSpacing * 1.1));
                        baseHomeY = waterLineY + (isMobile ? 45 : 210);
                    }
                }
                n.x += (baseHomeX - n.x) * (isMobile ? 0.005 : 0.001);
                n.y += (baseHomeY - n.y) * (isMobile ? 0.005 : 0.001);
            });

            drawFrame();
        }

        function getUniqueTriangleColor(tNodes, isAboveWater) {
            const sum = tNodes[0] + tNodes[1] + tNodes[2];
            return isAboveWater ? colorsAbove[sum % colorsAbove.length] : colorsBelow[sum % colorsBelow.length];
        }

        function drawSplitTriangle(ctx, p1, p2, p3, tNodes) {
            const pts = [p1, p2, p3];
            const above = [], below = [];

            pts.forEach(p => { if (p.y <= waterLineY) above.push(p); else below.push(p); });

            if (above.length === 3) {
                ctx.fillStyle = getUniqueTriangleColor(tNodes, true);
                ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.lineTo(p3.x, p3.y); ctx.closePath(); ctx.fill();
                return;
            }
            if (below.length === 3) {
                ctx.fillStyle = getUniqueTriangleColor(tNodes, false);
                ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.lineTo(p3.x, p3.y); ctx.closePath(); ctx.fill();
                return;
            }

            const interpolate = (pA, pB) => {
                const t = (waterLineY - pA.y) / (pB.y - pA.y);
                return { x: pA.x + t * (pB.x - pA.x), y: waterLineY };
            };

            if (above.length === 1) {
                const A = above[0], B1 = below[0], B2 = below[1];
                const I1 = interpolate(A, B1), I2 = interpolate(A, B2);

                ctx.fillStyle = getUniqueTriangleColor(tNodes, true);
                ctx.beginPath(); ctx.moveTo(A.x, A.y); ctx.lineTo(I1.x, I1.y); ctx.lineTo(I2.x, I2.y); ctx.closePath(); ctx.fill();

                ctx.fillStyle = getUniqueTriangleColor(tNodes, false);
                ctx.beginPath(); ctx.moveTo(I1.x, I1.y); ctx.lineTo(B1.x, B1.y); ctx.lineTo(B2.x, B2.y); ctx.lineTo(I2.x, I2.y); ctx.closePath(); ctx.fill();
            } else {
                const A1 = above[0], A2 = above[1], B = below[0];
                const I1 = interpolate(A1, B), I2 = interpolate(A2, B);

                ctx.fillStyle = getUniqueTriangleColor(tNodes, true);
                ctx.beginPath(); ctx.moveTo(A1.x, A1.y); ctx.lineTo(A2.x, A2.y); ctx.lineTo(I2.x, I2.y); ctx.lineTo(I1.x, I1.y); ctx.closePath(); ctx.fill();

                ctx.fillStyle = getUniqueTriangleColor(tNodes, false);
                ctx.beginPath(); ctx.moveTo(B.x, B.y); ctx.lineTo(I1.x, I1.y); ctx.lineTo(I2.x, I2.y); ctx.closePath(); ctx.fill();
            }
        }

        function drawFrame() {
            ctx.clearRect(0, 0, width, height);
            ctx.imageSmoothingEnabled = true;
            ctx.imageSmoothingQuality = 'high';

            const isMobile = window.innerWidth <= 768;

            stars.forEach((star, index) => {
                ctx.fillStyle = `rgba(202, 230, 239, ${star.opacity})`;
                ctx.beginPath(); ctx.arc(star.x, star.y, 1.2, 0, 2 * Math.PI); ctx.fill();

                for (let j = index + 1; j < stars.length; j++) {
                    const other = stars[j];
                    const dist = Math.hypot(star.x - other.x, star.y - other.y);
                    if (dist < 90) {
                        const lineOpacity = (1 - (dist / 90)) * star.opacity * 0.35;
                        ctx.strokeStyle = `rgba(202, 230, 239, ${lineOpacity})`;
                        ctx.lineWidth = 0.5;
                        ctx.beginPath(); ctx.moveTo(star.x, star.y); ctx.lineTo(other.x, other.y); ctx.stroke();
                    }
                }
            });

            triangles.forEach((t) => {
                const p1 = nodes[t[0]], p2 = nodes[t[1]], p3 = nodes[t[2]];
                if(p1 && p2 && p3) drawSplitTriangle(ctx, p1, p2, p3, t);
            });

            ctx.strokeStyle = 'rgba(255, 255, 255, 0.04)';
            ctx.lineWidth = 0.75;
            links.forEach(link => {
                ctx.beginPath(); ctx.moveTo(link.source.x, link.source.y); ctx.lineTo(link.target.x, link.target.y); ctx.stroke();
            });

            ctx.strokeStyle = 'rgba(88, 166, 255, 0.35)';
            ctx.lineWidth = 1.25;
            ctx.beginPath();
            outerPerimeterIndices.forEach((nodeIdx, i) => {
                const n = nodes[nodeIdx];
                if(i === 0) ctx.moveTo(n.x, n.y); else ctx.lineTo(n.x, n.y);
            });
            ctx.closePath(); ctx.stroke();

            ctx.strokeStyle = 'rgba(255, 255, 255, 0.12)';
            ctx.lineWidth = 1;
            ctx.setLineDash([6, 6]);
            ctx.beginPath(); ctx.moveTo(0, waterLineY); ctx.lineTo(width, waterLineY); ctx.stroke();
            ctx.setLineDash([]);

            nodes.forEach(node => {
                const isHovered = grabbedNode === node || (hoveredNode && hoveredNode.id === node.id);
                ctx.fillStyle = isHovered ? '#58a6ff' : (node.type === "visible" ? '#030710' : '#ffffff');
                ctx.strokeStyle = isHovered ? '#ffffff' : 'rgba(255, 255, 255, 0.4)';
                ctx.lineWidth = isHovered ? 1.75 : 1;

                ctx.beginPath(); ctx.arc(node.x, node.y, isHovered ? (isMobile ? 4.5 : 5.5) : (isMobile ? 2.5 : 3.5), 0, 2 * Math.PI);
                ctx.fill(); ctx.stroke();

                ctx.fillStyle = isHovered ? '#ffffff' : 'rgba(255, 255, 255, 0.55)';
                ctx.font = isHovered ? `600 ${isMobile ? 10 : 11}px -apple-system, BlinkMacSystemFont, sans-serif` : `400 ${isMobile ? 9 : 10}px -apple-system, BlinkMacSystemFont, sans-serif`;
                ctx.fillText(node.id, Math.round(node.x + (isMobile ? 9 : 12)), Math.round(node.y + 3));
            });
        }

        function getMousePos(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: clientX - rect.left, y: clientY - rect.top };
        }

        function findNode(pos) { return nodes.find(node => Math.hypot(node.x - pos.x, node.y - pos.y) < 25); }

        function handleMove(e) {
            const pos = getMousePos(e);
            if (grabbedNode) {
                grabbedNode.fx = pos.x; grabbedNode.fy = pos.y;
                simulation.alphaTarget(0.4).restart();
            } else {
                const node = findNode(pos);
                if (node !== hoveredNode) {
                    hoveredNode = node;
                    if (node) {
                        document.body.style.cursor = 'grab'; tooltip.style.opacity = 1;
                        document.getElementById('tooltip-title').innerText = node.id;
                        document.getElementById('tooltip-desc').innerText = descriptions[node.id] || "";
                    } else {
                        document.body.style.cursor = 'default'; tooltip.style.opacity = 0;
                    }
                }
                if (node) { tooltip.style.left = `${pos.x + 15}px`; tooltip.style.top = `${pos.y - 15}px`; }
            }
        }

        // CORRECCIÓN: Activación estricta de información y físicas global al hacer click o tap
        function handleStart(e) {
            if (e.target.closest('#contactMail')) return; // Evitar pisar el botón copiar mail
            
            const pos = getMousePos(e); 
            const node = findNode(pos);
            
            if (node) { 
                grabbedNode = node; 
                hoveredNode = node;
                document.body.style.cursor = 'grabbing'; 
                node.fx = node.x; node.fy = node.y; 
                
                // Desplegar información inmediatamente (crucial para móviles)
                tooltip.style.opacity = 1;
                document.getElementById('tooltip-title').innerText = node.id;
                document.getElementById('tooltip-desc').innerText = descriptions[node.id] || "";
                tooltip.style.left = `${pos.x + 15}px`; tooltip.style.top = `${pos.y - 15}px`;
            } else {
                // Si hace click afuera de un nodo, se limpia el estado
                tooltip.style.opacity = 0;
                hoveredNode = null;
            }
        }

        function handleEnd() {
            if (grabbedNode) { document.body.style.cursor = 'grab'; grabbedNode.fx = null; grabbedNode.fy = null; grabbedNode = null; simulation.alphaTarget(0.02); }
        }

        function copyEmailToClipboard() {
            const emailStr = "contacto@pire.ar";
            navigator.clipboard.writeText(emailStr).then(() => {
                const mailBtn = document.getElementById('contactMail');
                const labelSpan = document.getElementById('contactLabel');
                if (mailBtn && labelSpan) {
                    mailBtn.innerText = "¡Copiado!";
                    mailBtn.style.color = "var(--accent)";
                    labelSpan.style.opacity = "0.5";
                    setTimeout(() => {
                        mailBtn.innerText = emailStr;
                        mailBtn.style.color = "var(--text-main)";
                        labelSpan.style.opacity = "1";
                    }, 2000);
                }
            }).catch(err => { console.error("Error al copiar: ", err); });
        }

        // CORRECCIÓN: Eventos vinculados a window para evitar bloqueos por capas de texto superpuestas
        window.addEventListener('resize', resize);
        window.addEventListener('mousemove', handleMove);
        window.addEventListener('mousedown', handleStart);
        window.addEventListener('mouseup', handleEnd);
        window.addEventListener('touchmove', handleMove, { passive: true });
        window.addEventListener('touchstart', handleStart, { passive: true });
        window.addEventListener('touchend', handleEnd);

        resize();
    </script>
</body>
</html>
